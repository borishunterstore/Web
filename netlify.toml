[build]
  functions = "netlify/functions"
  publish = "."

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server/api/:splat"
  status = 200

[[redirects]]
  from = "/auth/discord/callback"
  to = "/.netlify/functions/server/auth/discord/callback"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"

  status = 200
