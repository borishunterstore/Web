<!DOCTYPE html>
<html lang="ru">
<head>
    <script src="js/cursor.js"></script>
    <div class="custom-cursor"></div>
    <canvas id="webCanvas"></canvas>
    <div class="scroll-indicator">
    <span class="scroll-value">0%</span>
    </div>
    <script src="js/pkm.js"></script>
    <script src="js/mobile-nav.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ | BHStore</title>
    <link rel="stylesheet" href="css/general.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/image/logo.png">
    <style>
        .admin-container {
            padding: 100px 20px 40px;
            max-width: 1400px;
            margin: 0 auto;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e1f29 0%, #14151a 100%);
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #5865F2;
        }

        .admin-header h1 {
            color: #5865F2;
            font-size: 2.5rem;
        }

        .admin-nav {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .admin-nav-btn {
            padding: 12px 24px;
            background: #2a2b36;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .admin-nav-btn:hover {
            background: #3a3b46;
        }

        .admin-nav-btn.active {
            background: #5865F2;
        }

        .admin-section {
            display: none;
            background: #2a2b36;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .admin-section.active {
            display: block;
        }

        .admin-section h2 {
            color: #5865F2;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #40444b;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #1e1f29;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #57F287;
            margin: 10px 0;
        }

        .stat-card .stat-label {
            color: #b9bbbe;
            font-size: 0.9rem;
        }

        .table-container {
            overflow-x: auto;
            background: #1e1f29;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #5865F2;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #40444b;
            color: #b9bbbe;
        }

        tr:hover {
            background: #2a2b36;
        }

        .btn-admin {
            padding: 8px 16px;
            background: #5865F2;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        .btn-admin:hover {
            background: #4752c4;
        }

        .btn-admin.danger {
            background: #ED4245;
        }

        .btn-admin.danger:hover {
            background: #c03537;
        }

        .btn-admin.success {
            background: #57F287;
            color: #1e1f29;
        }

        .btn-admin.success:hover {
            background: #4ad477;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #b9bbbe;
        }

        .loading i {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #5865F2;
        }

        .access-denied {
            text-align: center;
            padding: 100px 20px;
        }

        .access-denied i {
            font-size: 5rem;
            color: #ED4245;
            margin-bottom: 20px;
        }

        .access-denied h2 {
            color: #ED4245;
            margin-bottom: 10px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #2a2b36;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #b9bbbe;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            background: #1e1f29;
            border: 1px solid #40444b;
            border-radius: 8px;
            color: white;
            font-size: 16px;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <i class="fab fa-discord"></i>
                <span>BHStore</span>
            </a>
            <div class="nav-menu">
                <a href="/" class="nav-link"><i class="fas fa-home"></i> Главная</a>
                <a href="/shop.html" class="nav-link"><i class="fas fa-shopping-cart"></i> Магазин</a>
                <a href="/admin.html" class="nav-link active"><i class="fas fa-crown"></i> Админ панель</a>
                <a href="/profile.html" class="nav-link"><i class="fas fa-user"></i> Профиль</a>
            </div>
            <div class="nav-auth">
                <div class="nav-auth">
                    <i class="fab fa-discord"></i> Войти через Discord
                </button>
            </div>
            <button class="mobile-menu-btn">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-crown"></i> Админ панель</h1>
            <div style="color: #b9bbbe;">
                <i class="fas fa-user-shield"></i>
                <span id="adminUsername">Загрузка...</span>
            </div>
        </div>

        <div id="adminContent"></div>
    </div>

    <div id="addProductModal" class="modal">
        <div class="modal-content">
            <h2 style="color: #5865F2; margin-bottom: 20px;">Добавить товар</h2>
            <form id="addProductForm">
                <div class="form-group">
                    <label for="productName">Название товара</label>
                    <input type="text" id="productName" required>
                </div>
                <div class="form-group">
                    <label for="productDescription">Описание</label>
                    <textarea id="productDescription" required></textarea>
                </div>
                <div class="form-group">
                    <label for="productPrice">Цена (₽)</label>
                    <input type="number" id="productPrice" min="0" step="1" required>
                </div>
                <div class="form-group">
                    <label for="productCategory">Категория</label>
                    <select id="productCategory" required>
                        <option value="premium">Премиум</option>
                        <option value="services">Услуги</option>
                        <option value="events">Ивенты</option>
                        <option value="other">Другое</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="productIcon">Иконка (FontAwesome класс)</label>
                    <input type="text" id="productIcon" value="fas fa-box" required>
                </div>
                <div class="form-group">
                    <label for="productFeatures">Особенности (через запятую)</label>
                    <textarea id="productFeatures" placeholder="Особенность 1, Особенность 2, ..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-admin" onclick="closeModal('addProductModal')">Отмена</button>
                    <button type="submit" class="btn-admin success">Добавить товар</button>
                </div>
            </form>
        </div>
    </div>

    <div id="editProductModal" class="modal">
        <div class="modal-content">
            <h2 style="color: #5865F2; margin-bottom: 20px;">Редактировать товар</h2>
            <form id="editProductForm">
                <input type="hidden" id="editProductId">
                <div class="form-group">
                    <label for="editProductName">Название товара</label>
                    <input type="text" id="editProductName" required>
                </div>
                <div class="form-group">
                    <label for="editProductDescription">Описание</label>
                    <textarea id="editProductDescription" required></textarea>
                </div>
                <div class="form-group">
                    <label for="editProductPrice">Цена (₽)</label>
                    <input type="number" id="editProductPrice" min="0" step="1" required>
                </div>
                <div class="form-group">
                    <label for="editProductCategory">Категория</label>
                    <select id="editProductCategory" required>
                        <option value="premium">Премиум</option>
                        <option value="services">Услуги</option>
                        <option value="events">Ивенты</option>
                        <option value="other">Другое</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="editProductIcon">Иконка</label>
                    <input type="text" id="editProductIcon" required>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-admin" onclick="closeModal('editProductModal')">Отмена</button>
                    <button type="submit" class="btn-admin success">Сохранить изменения</button>
                </div>
            </form>
        </div>
    </div>

    <div id="addBalanceModal" class="modal">
        <div class="modal-content">
            <h2 style="color: #5865F2; margin-bottom: 20px;">Пополнение баланса</h2>
            <form id="addBalanceForm">
                <input type="hidden" id="balanceUserId">
                <div style="background: #1e1f29; padding: 1rem; border-radius: 8px; margin-bottom: 20px;">
                    <div style="color: #b9bbbe; margin-bottom: 5px;">Пользователь:</div>
                    <div style="color: white; font-weight: 600; font-size: 1.1rem;" id="balanceUserName">Загрузка...</div>
                </div>
                
                <div class="form-group">
                    <label for="balanceAmount">Сумма (₽)</label>
                    <input type="number" id="balanceAmount" min="1" step="1" required placeholder="Введите сумму">
                </div>
                <div class="form-group">
                    <label for="balanceReason">Причина пополнения</label>
                    <select id="balanceReason">
                        <option value="Пополнение администратором">Пополнение администратором</option>
                        <option value="Бонус за активность">Бонус за активность</option>
                        <option value="Возврат средств">Возврат средств</option>
                        <option value="Конкурс/Розыгрыш">Конкурс/Розыгрыш</option>
                        <option value="Оплата товара">Оплата товара</option>
                        <option value="Другое">Другое</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="balanceCustomReason">Или другая причина</label>
                    <input type="text" id="balanceCustomReason" placeholder="Введите свою причину">
                </div>
                
                <div style="background: #1e1f29; padding: 1rem; border-radius: 8px; margin-bottom: 20px; display: none;" id="quickAmounts">
                    <div style="color: #b9bbbe; margin-bottom: 10px;">Быстрое пополнение:</div>
                    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                        <button type="button" class="btn-admin small" onclick="document.getElementById('balanceAmount').value = 100">100 ₽</button>
                        <button type="button" class="btn-admin small" onclick="document.getElementById('balanceAmount').value = 500">500 ₽</button>
                        <button type="button" class="btn-admin small" onclick="document.getElementById('balanceAmount').value = 1000">1000 ₽</button>
                        <button type="button" class="btn-admin small" onclick="document.getElementById('balanceAmount').value = 2000">2000 ₽</button>
                        <button type="button" class="btn-admin small" onclick="document.getElementById('balanceAmount').value = 5000">5000 ₽</button>
                    </div>
                </div>
                
                <div class="form-actions">
                    <button type="button" class="btn-admin" onclick="closeModal('addBalanceModal')">Отмена</button>
                    <button type="submit" class="btn-admin success">
                        <i class="fas fa-plus"></i> Пополнить баланс
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/api.js"></script>
    <script src="js/admin-stats.js"></script>
    <script src="js/admin-users.js"></script>
    <script src="js/admin-orders.js"></script>
    <script src="js/admin-chat.js"></script>
    <script src="js/admin-products.js"></script>
    
    <script>
        window.adminState = {
            currentSection: 'stats'
        };

        document.addEventListener('DOMContentLoaded', async function() {
            const api = new BHStoreAPI();
            const authData = api.getAuthData();
            const isAdmin = await api.isAdmin();
            
        if (!isAdmin) {
            document.getElementById('adminContent').innerHTML = `
            <div class="access-denied">
                <i class="fas fa-ban"></i>
                <h2>Доступ запрещен</h2>
                <p>Требуются права администратора.</p>
                <a href="/" class="btn-admin" style="margin-top: 20px;">
                    <i class="fas fa-home"></i> Вернуться на главную
                </a>
            </div>
            `;
            return;
        }
    
    document.getElementById('adminUsername').textContent = authData.username || 'Администратор';
    
    loadAdminPanel();
});
        
        function loadAdminPanel() {
            document.getElementById('adminContent').innerHTML = `
                <div class="admin-nav">
                    <button class="admin-nav-btn active" data-section="stats">
                        <i class="fas fa-chart-bar"></i> Статистика
                    </button>
                    <button class="admin-nav-btn" data-section="users">
                        <i class="fas fa-users"></i> Пользователи
                    </button>
                    <button class="admin-nav-btn" data-section="orders">
                        <i class="fas fa-shopping-bag"></i> Заказы
                    </button>
                    <button class="admin-nav-btn" data-section="chat">
                        <i class="fas fa-comments"></i> Чат поддержки
                    </button>
                    <button class="admin-nav-btn" data-section="products">
                        <i class="fas fa-box"></i> Управление товарами
                    </button>
                </div>
                
                <div class="admin-section active" id="section-stats">
                    <h2><i class="fas fa-chart-bar"></i> Статистика магазина</h2>
                    <div id="statsContent" class="loading">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Загрузка статистики...</p>
                    </div>
                </div>
                
                <div class="admin-section" id="section-users">
                    <h2><i class="fas fa-users"></i> Пользователи</h2>
                    <div id="usersContent" class="loading">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Загрузка пользователей...</p>
                    </div>
                </div>
                
                <div class="admin-section" id="section-orders">
                    <h2><i class="fas fa-shopping-bag"></i> Заказы</h2>
                    <div id="ordersContent" class="loading">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Загрузка заказов...</p>
                    </div>
                </div>
                
                <div class="admin-section" id="section-chat">
                    <h2><i class="fas fa-comments"></i> Чат поддержки</h2>
                    <div id="chatContent" class="loading">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Загрузка чата...</p>
                    </div>
                </div>
                
                <div class="admin-section" id="section-products">
                    <h2><i class="fas fa-box"></i> Управление товарами</h2>
                    <div id="productsContent" class="loading">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Загрузка товаров...</p>
                    </div>
                </div>
            `;
            
            document.querySelectorAll('.admin-nav-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.admin-nav-btn').forEach(b => {
                        b.classList.remove('active');
                    });
                    
                    this.classList.add('active');
                    
                    document.querySelectorAll('.admin-section').forEach(section => {
                        section.classList.remove('active');
                    });
                    
                    const sectionId = this.dataset.section;
                    document.getElementById(`section-${sectionId}`).classList.add('active');
                    
                    window.adminState.currentSection = sectionId;
                    
                    loadSectionData(sectionId);
                });
            });
            
            loadSectionData('stats');
            
            initFormHandlers();
        }
        
        async function loadSectionData(section) {
            try {
                switch(section) {
                    case 'stats':
                        await loadStats();
                        break;
                    case 'users':
                        await loadUsers();
                        break;
                    case 'orders':
                        await loadOrders();
                        break;
                    case 'chat':
                        if (window.adminChat) {
                            await window.adminChat.init();
                        }
                        break;
                    case 'products':
                        await loadProducts();
                        break;
                }
            } catch (error) {
                console.error(`Ошибка загрузки секции ${section}:`, error);
                const contentElement = document.getElementById(`${section}Content`);
                if (contentElement) {
                    contentElement.innerHTML = `
                        <div style="color: #ED4245; padding: 20px; text-align: center;">
                            <i class="fas fa-exclamation-triangle"></i>
                            <p>Ошибка загрузки: ${error.message}</p>
                        </div>
                    `;
                }
            }
        }
        
        function showModal(modalId) {
            document.getElementById(modalId).style.display = 'flex';
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
            const form = document.getElementById(modalId.replace('Modal', 'Form'));
            if (form) {
                form.reset();
            }
        }
        
        function initFormHandlers() {
            const addProductForm = document.getElementById('addProductForm');
            if (addProductForm) {
                addProductForm.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    
                    const productData = {
                        name: document.getElementById('productName').value,
                        description: document.getElementById('productDescription').value,
                        price: parseInt(document.getElementById('productPrice').value),
                        category: document.getElementById('productCategory').value,
                        icon: document.getElementById('productIcon').value,
                        features: document.getElementById('productFeatures').value
                            .split(',')
                            .map(f => f.trim())
                            .filter(f => f)
                    };
                    
                    try {
                        const api = new BHStoreAPI();
                        await api.createProduct(productData);
                        closeModal('addProductModal');
                        if (window.adminState.currentSection === 'products') {
                            await loadProducts();
                        }
                    } catch (error) {
                        alert('Ошибка добавления товара: ' + error.message);
                    }
                });
            }
            
            const editProductForm = document.getElementById('editProductForm');
            if (editProductForm) {
                editProductForm.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    
                    const productData = {
                        id: document.getElementById('editProductId').value,
                        name: document.getElementById('editProductName').value,
                        description: document.getElementById('editProductDescription').value,
                        price: parseInt(document.getElementById('editProductPrice').value),
                        category: document.getElementById('editProductCategory').value,
                        icon: document.getElementById('editProductIcon').value
                    };
                    
                    try {
                        const api = new BHStoreAPI();
                        await api.updateProduct(productData.id, productData);
                        closeModal('editProductModal');
                        if (window.adminState.currentSection === 'products') {
                            await loadProducts();
                        }
                    } catch (error) {
                        alert('Ошибка редактирования товара: ' + error.message);
                    }
                });
            }
            
            const addBalanceForm = document.getElementById('addBalanceForm');
            if (addBalanceForm) {
                addBalanceForm.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    
                    const userId = document.getElementById('balanceUserId').value;
                    const amount = parseInt(document.getElementById('balanceAmount').value);
                    let reason = document.getElementById('balanceReason').value;
                    
                    if (reason === 'Другое') {
                        const customReason = document.getElementById('balanceCustomReason').value;
                        reason = customReason || 'Пополнение администратором';
                    }
                    
                    if (!amount || amount <= 0) {
                        alert('Введите корректную сумму');
                        return;
                    }
                    
                    try {
                        const api = new BHStoreAPI();
                        await api.addUserBalance(userId, amount, reason);
                        closeModal('addBalanceModal');
                        if (window.adminState.currentSection === 'users') {
                            await loadUsers();
                        }
                    } catch (error) {
                        console.error('Ошибка пополнения баланса:', error);
                        alert('Ошибка пополнения баланса: ' + error.message);
                    }
                });
                
                const balanceReason = document.getElementById('balanceReason');
                if (balanceReason) {
                    balanceReason.addEventListener('change', function() {
                        const customReasonField = document.getElementById('balanceCustomReason');
                        const quickAmounts = document.getElementById('quickAmounts');
                        
                        if (this.value === 'Другое') {
                            customReasonField.style.display = 'block';
                        } else {
                            customReasonField.style.display = 'none';
                        }
                        
                        if (this.value === 'Пополнение администратором' || this.value === 'Бонус за активность') {
                            quickAmounts.style.display = 'block';
                        } else {
                            quickAmounts.style.display = 'none';
                        }
                    });
                }
            }
        }
        
        window.openUserChat = function(userId) {
            document.querySelector('.admin-nav-btn[data-section="chat"]').click();
            
            setTimeout(() => {
                if (window.adminChat) {
                    window.adminChat.selectUser(userId);
                }
            }, 100);
        };
        
        window.addBalance = function(userId, username) {
            document.getElementById('balanceUserId').value = userId;
            document.getElementById('balanceUserName').textContent = username;
            showModal('addBalanceModal');
        };
        
        window.removeBalance = function(userId, username) {
            const amount = prompt(`Введите сумму для списания (₽) от пользователя ${username}:`);
            if (amount && !isNaN(amount) && amount > 0) {
                const reason = prompt('Причина списания (необязательно):');
                if (reason !== null) {
                    const api = new BHStoreAPI();
                    api.removeUserBalance(userId, parseInt(amount), reason || 'Списание администратором')
                        .then(() => {
                            if (window.adminState.currentSection === 'users') {
                                loadUsers();
                            }
                        })
                        .catch(error => {
                            alert('Ошибка списания: ' + error.message);
                        });
                }
            }
        };
        
        window.setBalance = function(userId, username, currentBalance) {
            const newBalance = prompt(`Установить баланс для ${username} (текущий: ${currentBalance} ₽):`, currentBalance);
            if (newBalance !== null && !isNaN(newBalance) && newBalance >= 0) {
                const reason = prompt('Причина изменения баланса (необязательно):');
                if (reason !== null) {
                    const api = new BHStoreAPI();
                    api.setUserBalance(userId, parseInt(newBalance), reason || 'Изменение администратором')
                        .then(() => {
                            if (window.adminState.currentSection === 'users') {
                                loadUsers();
                            }
                        })
                        .catch(error => {
                            alert('Ошибка установки баланса: ' + error.message);
                        });
                }
            }
        };
        
        window.viewBalanceHistory = function(userId, username) {
            const api = new BHStoreAPI();
            api.getUserBalanceHistory(userId)
                .then(data => {
                    if (window.AdminUsers) {
                        const adminUsers = new AdminUsers();
                        adminUsers.showBalanceHistoryModal(userId, username, data);
                    }
                })
                .catch(error => {
                    alert('Ошибка получения истории: ' + error.message);
                });
        };
        
        window.showAddProductForm = function() {
            showModal('addProductModal');
        };
        
        window.editProduct = function(productId) {
            alert('Редактирование товара: ' + productId);
            showModal('editProductModal');
        };
        
        window.deleteProduct = function(productId) {
            if (confirm(`Вы уверены, что хотите удалить товар ${productId}?`)) {
                const api = new BHStoreAPI();
                api.deleteProduct(productId)
                    .then(() => {
                        if (window.adminState.currentSection === 'products') {
                            loadProducts();
                        }
                    })
                    .catch(error => {
                        alert('Ошибка удаления товара: ' + error.message);
                    });
            }
        };
        
        window.exportUsers = function() {
            alert('Экспорт пользователей в CSV файл');
        };
        
        window.exportOrders = function() {
            alert('Экспорт заказов в CSV файл');
        };
        
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('modal')) {
                e.target.style.display = 'none';
            }
        });
    </script>

</body>
</html>
