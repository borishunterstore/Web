<!DOCTYPE html>
<html lang="ru">
<head>
    <script src="js/cursor.js"></script>
    <div class="custom-cursor"></div>
    <canvas id="webCanvas"></canvas>
    <div class="scroll-indicator">
        <span class="scroll-value">0%</span>
    </div>
    <script src="js/pkm.js"></script>
    <script src="js/mobile-nav.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ | BHStore</title>
    <link rel="stylesheet" href="css/general.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/image/logo.png">
    <style>
        .admin-container {
            padding: 100px 20px 40px;
            max-width: 1400px;
            margin: 0 auto;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e1f29 0%, #14151a 100%);
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #5865F2;
        }

        .admin-header h1 {
            color: #5865F2;
            font-size: 2.5rem;
        }

        .admin-nav {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .admin-nav-btn {
            padding: 12px 24px;
            background: #2a2b36;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .admin-nav-btn:hover {
            background: #3a3b46;
        }

        .admin-nav-btn.active {
            background: #5865F2;
        }

        .admin-section {
            display: none;
            background: #2a2b36;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .admin-section.active {
            display: block;
        }

        .admin-section h2 {
            color: #5865F2;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #40444b;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #1e1f29;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #57F287;
            margin: 10px 0;
        }

        .stat-card .stat-label {
            color: #b9bbbe;
            font-size: 0.9rem;
        }

        .table-container {
            overflow-x: auto;
            background: #1e1f29;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #5865F2;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #40444b;
            color: #b9bbbe;
        }

        tr:hover {
            background: #2a2b36;
        }

        .btn-admin {
            padding: 8px 16px;
            background: #5865F2;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        .btn-admin:hover {
            background: #4752c4;
        }

        .btn-admin.danger {
            background: #ED4245;
        }

        .btn-admin.danger:hover {
            background: #c03537;
        }

        .btn-admin.success {
            background: #57F287;
            color: #1e1f29;
        }

        .btn-admin.success:hover {
            background: #4ad477;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #b9bbbe;
        }

        .loading i {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #5865F2;
        }

        .access-denied {
            text-align: center;
            padding: 100px 20px;
        }

        .access-denied i {
            font-size: 5rem;
            color: #ED4245;
            margin-bottom: 20px;
        }

        .access-denied h2 {
            color: #ED4245;
            margin-bottom: 10px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #2a2b36;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #b9bbbe;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            background: #1e1f29;
            border: 1px solid #40444b;
            border-radius: 8px;
            color: white;
            font-size: 16px;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 30px;
        }

        .user-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 5px;
            font-size: 0.8rem;
        }

        .user-badge.admin {
            background: #ED4245;
            color: white;
        }

        .user-badge.verified {
            background: #57F287;
            color: #1e1f29;
        }

        .user-badge.partner {
            background: #FEE75C;
            color: #1e1f29;
        }

        .user-badge.buyer {
            background: #5865F2;
            color: white;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <i class="fab fa-discord"></i>
                <span>BHStore</span>
            </a>
            <div class="nav-menu">
                <a href="/" class="nav-link"><i class="fas fa-home"></i> Главная</a>
                <a href="/shop.html" class="nav-link"><i class="fas fa-shopping-cart"></i> Магазин</a>
                <a href="/admin.html" class="nav-link active"><i class="fas fa-crown"></i> Админ панель</a>
                <a href="/profile.html" class="nav-link"><i class="fas fa-user"></i> Профиль</a>
            </div>
            <div class="nav-auth">
                <button class="nav-auth-btn" onclick="window.location.href='/profile.html'">
                    <i class="fab fa-discord"></i> Профиль
                </button>
            </div>
            <button class="mobile-menu-btn">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-crown"></i> Админ панель</h1>
            <div style="color: #b9bbbe;">
                <i class="fas fa-user-shield"></i>
                <span id="adminUsername">Загрузка...</span>
            </div>
        </div>

        <div id="adminContent"></div>
    </div>

    <div id="addBalanceModal" class="modal">
        <div class="modal-content">
            <h2 style="color: #5865F2; margin-bottom: 20px;">
                <i class="fas fa-plus-circle"></i> Пополнить баланс
            </h2>
            <form id="addBalanceForm">
                <input type="hidden" id="balanceUserId">
                
                <div style="background: #1e1f29; padding: 1rem; border-radius: 8px; margin-bottom: 20px;">
                    <div style="color: #b9bbbe; margin-bottom: 5px;">Пользователь:</div>
                    <div style="color: white; font-weight: 600; font-size: 1.1rem;" id="balanceUserName">Загрузка...</div>
                </div>
                
                <div class="form-group">
                    <label for="balanceAmount">Сумма пополнения (₽)</label>
                    <input type="number" id="balanceAmount" min="1" step="1" required placeholder="Введите сумму">
                </div>
                
                <div class="form-group">
                    <label for="balanceReason">Причина</label>
                    <select id="balanceReason">
                        <option value="Пополнение администратором">Пополнение администратором</option>
                        <option value="Бонус за активность">Бонус за активность</option>
                        <option value="Возврат средств">Возврат средств</option>
                        <option value="Конкурс/Розыгрыш">Конкурс/Розыгрыш</option>
                        <option value="Оплата товара">Оплата товара</option>
                        <option value="Другое">Другое</option>
                    </select>
                </div>
                
                <div class="form-group" id="balanceCustomReasonGroup" style="display: none;">
                    <label for="balanceCustomReason">Укажите причину</label>
                    <input type="text" id="balanceCustomReason" placeholder="Введите свою причину">
                </div>
                
                <div style="background: #1e1f29; padding: 1rem; border-radius: 8px; margin-bottom: 20px;" id="quickAmounts">
                    <div style="color: #b9bbbe; margin-bottom: 10px;">Быстрое пополнение:</div>
                    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                        <button type="button" class="btn-admin small" onclick="document.getElementById('balanceAmount').value = 100">100 ₽</button>
                        <button type="button" class="btn-admin small" onclick="document.getElementById('balanceAmount').value = 500">500 ₽</button>
                        <button type="button" class="btn-admin small" onclick="document.getElementById('balanceAmount').value = 1000">1000 ₽</button>
                        <button type="button" class="btn-admin small" onclick="document.getElementById('balanceAmount').value = 5000">5000 ₽</button>
                        <button type="button" class="btn-admin small" onclick="document.getElementById('balanceAmount').value = 10000">10000 ₽</button>
                    </div>
                </div>
                
                <div class="form-actions">
                    <button type="button" class="btn-admin" onclick="closeModal('addBalanceModal')">Отмена</button>
                    <button type="submit" class="btn-admin success">
                        <i class="fas fa-plus"></i> Пополнить
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div id="removeBalanceModal" class="modal">
        <div class="modal-content">
            <h2 style="color: #FEE75C; margin-bottom: 20px;">
                <i class="fas fa-minus-circle"></i> Списать баланс
            </h2>
            <form id="removeBalanceForm">
                <input type="hidden" id="removeBalanceUserId">
                
                <div style="background: #1e1f29; padding: 1rem; border-radius: 8px; margin-bottom: 20px;">
                    <div style="color: #b9bbbe; margin-bottom: 5px;">Пользователь:</div>
                    <div style="color: white; font-weight: 600; font-size: 1.1rem;" id="removeBalanceUserName">Загрузка...</div>
                </div>
                
                <div class="form-group">
                    <label for="removeBalanceAmount">Сумма списания (₽)</label>
                    <input type="number" id="removeBalanceAmount" min="1" step="1" required placeholder="Введите сумму">
                </div>
                
                <div class="form-group">
                    <label for="removeBalanceReason">Причина</label>
                    <input type="text" id="removeBalanceReason" placeholder="Например: Штраф, возврат" value="Списание администратором">
                </div>
                
                <div class="form-actions">
                    <button type="button" class="btn-admin" onclick="closeModal('removeBalanceModal')">Отмена</button>
                    <button type="submit" class="btn-admin" style="background: #FEE75C; color: #1e1f29;">
                        <i class="fas fa-minus"></i> Списать
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div id="balanceHistoryModal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="color: #5865F2; margin: 0;">
                    <i class="fas fa-history"></i> История баланса
                </h2>
                <button onclick="closeModal('balanceHistoryModal')" style="background: none; border: none; color: #b9bbbe; font-size: 1.5rem; cursor: pointer;">×</button>
            </div>
            <div id="balanceHistoryContent" class="loading">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Загрузка истории...</p>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/admin-stats.js"></script>
    <script src="js/admin-users.js"></script>
    <script src="js/admin-orders.js"></script>
    <script src="js/admin-chat.js"></script>
    <script src="js/admin-products.js"></script>
    <script src="js/main.js"></script>
    
    <script>
        // Глобальные функции для модальных окон
        window.showModal = function(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) {
                modal.style.display = 'flex';
            }
        };

        window.closeModal = function(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) {
                modal.style.display = 'none';
            }
        };

        // Инициализация при загрузке страницы
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('🚀 Админ панель загружается...');
            
            try {
                const api = new BHStoreAPI();
                
                // Проверяем авторизацию
                const authData = api.getAuthData();
                
                if (!authData.token) {
                    window.location.href = '/profile.html';
                    return;
                }
                
                // Проверяем права администратора
                const isAdmin = await api.isAdmin();
                
                if (!isAdmin) {
                    document.getElementById('adminContent').innerHTML = `
                        <div class="access-denied">
                            <i class="fas fa-ban"></i>
                            <h2>Доступ запрещен</h2>
                            <p>Требуются права администратора для доступа к этой странице.</p>
                            <a href="/" class="btn-admin" style="margin-top: 20px;">
                                <i class="fas fa-home"></i> Вернуться на главную
                            </a>
                        </div>
                    `;
                    return;
                }
                
                // Отображаем имя администратора
                document.getElementById('adminUsername').textContent = authData.username || 'Администратор';
                
                // Загружаем админ панель
                loadAdminPanel();
                
            } catch (error) {
                console.error('❌ Ошибка инициализации:', error);
                document.getElementById('adminContent').innerHTML = `
                    <div class="access-denied">
                        <i class="fas fa-exclamation-triangle" style="color: #ED4245;"></i>
                        <h2 style="color: #ED4245;">Ошибка загрузки</h2>
                        <p>${error.message || 'Не удалось загрузить админ панель'}</p>
                        <button onclick="location.reload()" class="btn-admin" style="margin-top: 20px;">
                            <i class="fas fa-sync-alt"></i> Обновить страницу
                        </button>
                    </div>
                `;
            }
        });

        // Загрузка админ панели
        function loadAdminPanel() {
            document.getElementById('adminContent').innerHTML = `
                <div class="admin-nav">
                    <button class="admin-nav-btn active" data-section="stats">
                        <i class="fas fa-chart-bar"></i> Статистика
                    </button>
                    <button class="admin-nav-btn" data-section="users">
                        <i class="fas fa-users"></i> Пользователи
                    </button>
                    <button class="admin-nav-btn" data-section="orders">
                        <i class="fas fa-shopping-bag"></i> Заказы
                    </button>
                    <button class="admin-nav-btn" data-section="chat">
                        <i class="fas fa-comments"></i> Чат поддержки
                    </button>
                    <button class="admin-nav-btn" data-section="products">
                        <i class="fas fa-box"></i> Товары
                    </button>
                </div>
                
                <div class="admin-section active" id="section-stats">
                    <h2><i class="fas fa-chart-bar"></i> Статистика магазина</h2>
                    <div id="statsContent" class="loading">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Загрузка статистики...</p>
                    </div>
                </div>
                
                <div class="admin-section" id="section-users">
                    <h2><i class="fas fa-users"></i> Пользователи</h2>
                    <div id="usersContent" class="loading">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Загрузка пользователей...</p>
                    </div>
                </div>
                
                <div class="admin-section" id="section-orders">
                    <h2><i class="fas fa-shopping-bag"></i> Заказы</h2>
                    <div id="ordersContent" class="loading">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Загрузка заказов...</p>
                    </div>
                </div>
                
                <div class="admin-section" id="section-chat">
                    <h2><i class="fas fa-comments"></i> Чат поддержки</h2>
                    <div id="chatContent" class="loading">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Загрузка чата...</p>
                    </div>
                </div>
                
                <div class="admin-section" id="section-products">
                    <h2><i class="fas fa-box"></i> Управление товарами</h2>
                    <div id="productsContent" class="loading">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Загрузка товаров...</p>
                    </div>
                </div>
            `;
            
            // Навешиваем обработчики на кнопки навигации
            document.querySelectorAll('.admin-nav-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.admin-nav-btn').forEach(b => {
                        b.classList.remove('active');
                    });
                    
                    this.classList.add('active');
                    
                    document.querySelectorAll('.admin-section').forEach(section => {
                        section.classList.remove('active');
                    });
                    
                    const sectionId = this.dataset.section;
                    document.getElementById(`section-${sectionId}`).classList.add('active');
                    
                    // Загружаем данные секции
                    loadSectionData(sectionId);
                });
            });
            
            // Загружаем статистику по умолчанию
            loadSectionData('stats');
            
            // Инициализируем обработчики форм
            initFormHandlers();
        }

        // Загрузка данных секции
        async function loadSectionData(section) {
            try {
                switch(section) {
                    case 'stats':
                        if (window.adminStats) {
                            await window.adminStats.loadStats();
                        } else {
                            console.error('adminStats не инициализирован');
                        }
                        break;
                    case 'users':
                        if (window.adminUsers) {
                            await window.adminUsers.loadUsers();
                        } else {
                            console.error('adminUsers не инициализирован');
                        }
                        break;
                    case 'orders':
                        if (window.adminOrders) {
                            await window.adminOrders.loadOrders();
                        } else {
                            console.error('adminOrders не инициализирован');
                        }
                        break;
                    case 'chat':
                        if (window.adminChat) {
                            await window.adminChat.init();
                        } else {
                            console.error('adminChat не инициализирован');
                        }
                        break;
                    case 'products':
                        if (window.adminProducts) {
                            await window.adminProducts.loadProducts();
                        } else {
                            console.error('adminProducts не инициализирован');
                        }
                        break;
                }
            } catch (error) {
                console.error(`Ошибка загрузки секции ${section}:`, error);
                
                const contentElement = document.getElementById(`${section}Content`);
                if (contentElement) {
                    contentElement.innerHTML = `
                        <div style="color: #ED4245; padding: 20px; text-align: center;">
                            <i class="fas fa-exclamation-triangle" style="font-size: 2rem; margin-bottom: 10px;"></i>
                            <p>Ошибка загрузки: ${error.message}</p>
                            <button onclick="loadSectionData('${section}')" class="btn-admin" style="margin-top: 10px;">
                                <i class="fas fa-sync-alt"></i> Повторить
                            </button>
                        </div>
                    `;
                }
            }
        }

        // Инициализация обработчиков форм
        function initFormHandlers() {
            // Форма пополнения баланса
            const addBalanceForm = document.getElementById('addBalanceForm');
            if (addBalanceForm) {
                addBalanceForm.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    
                    const userId = document.getElementById('balanceUserId').value;
                    const amount = parseInt(document.getElementById('balanceAmount').value);
                    let reason = document.getElementById('balanceReason').value;
                    
                    if (reason === 'Другое') {
                        const customReason = document.getElementById('balanceCustomReason').value;
                        reason = customReason || 'Пополнение администратором';
                    }
                    
                    if (!amount || amount <= 0) {
                        alert('Введите корректную сумму');
                        return;
                    }
                    
                    try {
                        const api = new BHStoreAPI();
                        await api.addUserBalance(userId, amount, reason);
                        
                        closeModal('addBalanceModal');
                        
                        // Показываем уведомление об успехе
                        showNotification(`Баланс пополнен на ${amount} ₽`, 'success');
                        
                        // Обновляем список пользователей
                        if (window.adminUsers) {
                            await window.adminUsers.loadUsers();
                        }
                        
                    } catch (error) {
                        console.error('Ошибка пополнения баланса:', error);
                        alert('Ошибка пополнения баланса: ' + (error.message || 'Неизвестная ошибка'));
                    }
                });
            }
            
            // Обработчик выбора причины пополнения
            const balanceReason = document.getElementById('balanceReason');
            if (balanceReason) {
                balanceReason.addEventListener('change', function() {
                    const customGroup = document.getElementById('balanceCustomReasonGroup');
                    if (this.value === 'Другое') {
                        customGroup.style.display = 'block';
                    } else {
                        customGroup.style.display = 'none';
                    }
                });
            }
            
            // Форма списания баланса
            const removeBalanceForm = document.getElementById('removeBalanceForm');
            if (removeBalanceForm) {
                removeBalanceForm.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    
                    const userId = document.getElementById('removeBalanceUserId').value;
                    const amount = parseInt(document.getElementById('removeBalanceAmount').value);
                    const reason = document.getElementById('removeBalanceReason').value || 'Списание администратором';
                    
                    if (!amount || amount <= 0) {
                        alert('Введите корректную сумму');
                        return;
                    }
                    
                    try {
                        const api = new BHStoreAPI();
                        await api.removeUserBalance(userId, amount, reason);
                        
                        closeModal('removeBalanceModal');
                        
                        showNotification(`Списано ${amount} ₽ с баланса`, 'success');
                        
                        if (window.adminUsers) {
                            await window.adminUsers.loadUsers();
                        }
                        
                    } catch (error) {
                        console.error('Ошибка списания баланса:', error);
                        alert('Ошибка списания баланса: ' + (error.message || 'Неизвестная ошибка'));
                    }
                });
            }
        }

        // Утилита для показа уведомлений
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 15px 25px;
                border-radius: 8px;
                color: white;
                background: ${type === 'success' ? '#57F287' : type === 'error' ? '#ED4245' : '#5865F2'};
                z-index: 10001;
                box-shadow: 0 4px 15px rgba(0,0,0,0.3);
                animation: slideIn 0.3s ease;
                max-width: 300px;
            `;
            notification.textContent = message;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // Закрытие модальных окон по клику на фон
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('modal')) {
                e.target.style.display = 'none';
            }
        });

        // Глобальные функции для использования в админ-классах
        window.openUserChat = function(userId) {
            // Переключаемся на вкладку чата
            const chatBtn = document.querySelector('.admin-nav-btn[data-section="chat"]');
            if (chatBtn) {
                chatBtn.click();
                
                // Выбираем пользователя после загрузки чата
                setTimeout(() => {
                    if (window.adminChat) {
                        window.adminChat.selectUser(userId);
                    }
                }, 500);
            }
        };

        window.addBalance = function(userId, username) {
            document.getElementById('balanceUserId').value = userId;
            document.getElementById('balanceUserName').textContent = username;
            document.getElementById('balanceAmount').value = '';
            document.getElementById('balanceReason').value = 'Пополнение администратором';
            document.getElementById('balanceCustomReasonGroup').style.display = 'none';
            showModal('addBalanceModal');
        };

        window.removeBalance = function(userId, username) {
            document.getElementById('removeBalanceUserId').value = userId;
            document.getElementById('removeBalanceUserName').textContent = username;
            document.getElementById('removeBalanceAmount').value = '';
            document.getElementById('removeBalanceReason').value = 'Списание администратором';
            showModal('removeBalanceModal');
        };

        window.viewBalanceHistory = function(userId, username) {
            if (window.adminUsers) {
                window.adminUsers.viewBalanceHistory(userId, username);
            }
        };

        window.exportUsers = function() {
            if (window.adminUsers) {
                window.adminUsers.exportUsers();
            }
        };

        window.exportOrders = function() {
            if (window.adminOrders) {
                window.adminOrders.exportOrders();
            }
        };

        window.showAddProductForm = function() {
            if (window.adminProducts) {
                window.adminProducts.showAddProductForm();
            }
        };

        window.editProduct = function(productId) {
            if (window.adminProducts) {
                window.adminProducts.editProduct(productId);
            }
        };

        window.deleteProduct = function(productId) {
            if (window.adminProducts) {
                window.adminProducts.deleteProduct(productId);
            }
        };
    </script>
</body>
</html>
